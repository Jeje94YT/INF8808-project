<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="utf-8">
    <title>Airplane Accidents Visualization</title>

    <script src="https://d3js.org/d3.v7.min.js"></script>

    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="dashboard">

    <h1>Évolution des accidents d'avion (1908-2023)</h1>

    <p class="description">
        Cette visualisation présente l’évolution du nombre d’accidents d’avion dans le monde
        au fil du temps. Survolez les points pour voir les détails.
    </p>

    <div class="chart-container">
        <svg id="lineChart"></svg>
    </div>


    <div class="slider-container">
        <label for="yearRange">Filtrer par année :</label>
        <input type="range" id="yearRange" min="1908" max="2023" value="2023">
        <span id="yearLabel">2023</span>
    </div>
    <h2>Carte des accidents</h2>
    <div class="map-and-controls">
        <div class="map-legend">
            <h3>Légende</h3>
            <ul>
                <li><span class="legend-circle red"></span> Accidents de guerre</li>
                <li><span class="legend-circle blue"></span> Autres accidents</li>
            </ul>
        </div>

        <div class="chart-container">
            <svg id="mapChart"></svg>
        </div>

        <div class="filters">
            <label for="filterWar">Afficher :</label>
            <select id="filterWar">
                <option value="all">Tous</option>
                <option value="war">Accidents de guerre (rouge)</option>
                <option value="other">Autres accidents (bleu)</option>
            </select>

            <label for="filterGroup">Regrouper par :</label>
            <select id="filterGroup">
                <option value="continent">Continent</option>
                <option value="topography">Zone géographique</option>
            </select>
        </div>
    </div>

    <div class="timeline-container">
        <svg id="timelineChart"></svg>
    </div>

    <div class="mortalities-container">
        <svg id="decadeChart"></svg>
    </div>

    <div class="ground-deaths-container">
        <svg id="groundChart"></svg>
    </div>

</div>

<script src="script.js"></script>

</body>
</html>
